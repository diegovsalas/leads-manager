services:
  # Flask CRM (ya existente)
  - type: web
    name: leads-manager-avantex
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gevent -w 1 --timeout 120 "avantex_crm:create_app()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: BOT_SECRET
        sync: false
      - key: BAILEYS_URL
        sync: false
      - key: SAVIO_BASE_URL
        value: https://api.savio.mx/api/v1
      - key: SAVIO_API_KEY
        sync: false
      - key: SAVIO_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: LUSHA_API_KEY
        sync: false
      - key: LEMLIST_API_KEY
        sync: false
      - key: DOMAIN
        value: https://leads-manager-avantex.onrender.com
      - key: AIRCALL_API_ID
        sync: false
      - key: AIRCALL_API_TOKEN
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REDIRECT_URI
        value: https://leads-manager-avantex.onrender.com/api/zoho/auth/zoho/callback
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_API_VERSION
        value: v19.0
      - key: META_APP_ID
        sync: false
      - key: META_ACCOUNT_B2C
        sync: false
      - key: META_ACCOUNT_B2B
        sync: false
      - key: META_ACCOUNT_WELDU
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false

  # WhatsApp Baileys Bot
  - type: web
    name: avantex-whatsapp-bot
    runtime: node
    rootDir: whatsapp-bot
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    envVars:
      - key: CRM_WEBHOOK_URL
        value: https://leads-manager-avantex.onrender.com/webhook/baileys
      - key: BOT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
