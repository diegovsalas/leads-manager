<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CS Avantex{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>{if(window.Chart){Chart.defaults.maintainAspectRatio=false;Chart.defaults.responsive=true;}});</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                extend: {
                    colors: {
                        nav: { bg: '#1e1b3a', hover: '#2d2952', active: '#3b3566' },
                        brand: {
                            50:'#f3f0ff',100:'#e9e3ff',200:'#d4c9ff',300:'#b49dff',
                            400:'#9171f5',500:'#7c3aed',600:'#6d28d9',700:'#5b21b6',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px;}
        .shell{display:grid;grid-template-columns:200px 1fr;height:100vh;}
        .cs-sidebar{background:#1e1b3a;display:flex;flex-direction:column;overflow:hidden;padding-top:12px;}
        .cs-sidebar-brand{padding:4px 14px 20px;font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;}
        .cs-sidebar-brand .hl{color:#9171f5;}
        .cs-link{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.55);transition:all 120ms;font-size:13px;margin:1px 4px;text-decoration:none;}
        .cs-link:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);}
        .cs-link.active{background:rgba(255,255,255,.12);color:#c4b5fd;font-weight:500;}
        .cs-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 14px;}
        .cs-sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.08);}
        .cs-content{overflow-y:auto;background:#f5f5f9;}
        .table-clean th{font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
        .table-clean td{padding-top:.875rem;padding-bottom:.875rem;border-bottom:1px solid #f3f4f6;}
        .table-clean tr:last-child td{border-bottom:none;}
        .table-clean tr:hover td{background:#faf9ff;}
    </style>
</head>
<body class="font-sans">

<div class="shell">
    <!-- Sidebar -->
    <aside class="cs-sidebar">
        <div class="cs-sidebar-brand"><span class="hl">CS</span>AVANTEX</div>

        <a href="/cs/" class="cs-link {% if request.endpoint == 'cs.dashboard' %}active{% endif %}">📊 Dashboard</a>
        <a href="/cs/clientes" class="cs-link {% if request.endpoint == 'cs.clientes' %}active{% endif %}">🏢 Clientes</a>
        <a href="/cs/contactos" class="cs-link {% if request.endpoint == 'cs.contactos_directory' %}active{% endif %}">👥 Contactos</a>
        <a href="/cs/kam" class="cs-link {% if request.endpoint == 'cs.kam_view' %}active{% endif %}">👤 KAMs</a>
        <a href="/cs/oportunidades" class="cs-link {% if request.endpoint == 'cs.oportunidades' %}active{% endif %}">🎯 Oportunidades</a>
        <a href="/cs/onboarding" class="cs-link {% if request.endpoint == 'cs.onboarding' %}active{% endif %}">🚀 Onboarding</a>
        <a href="/cs/alertas" class="cs-link {% if request.endpoint == 'cs.alertas_view' %}active{% endif %}">🔔 Alertas</a>

        {% if not is_kam %}
        <div class="cs-divider"></div>
        <a href="/" class="cs-link" style="color:rgba(255,255,255,.35);">← CRM</a>
        {% endif %}

        <div class="cs-sidebar-bottom">
            <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:26px;height:26px;border-radius:50%;background:#7c3aed;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">{{ user_nombre[:2]|upper if user_nombre else 'U' }}</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:12px;font-weight:500;color:rgba(255,255,255,.85);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ user_nombre }}</div>
                    <div style="font-size:11px;color:rgba(255,255,255,.4);">{{ user_rol }}</div>
                </div>
                <a href="/logout" style="font-size:11px;color:rgba(255,255,255,.35);text-decoration:none;">⏻</a>
            </div>
        </div>
    </aside>

    <!-- Content -->
    <main class="cs-content">
        <div class="max-w-[1400px] mx-auto px-6 py-6">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
