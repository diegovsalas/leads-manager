<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — {{ account.nombre }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:440px;width:100%;padding:48px 32px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;color:#1e1b3a;margin-bottom:8px}
p{font-size:14px;color:#888;line-height:1.6}
.brand{margin-top:32px;font-size:12px;color:#ccc}
</style>
</head>
<body>
<div class="card">
    <div class="icon">🙏</div>
    <h1>Gracias por tu respuesta</h1>
    <p>Tu opinion nos ayuda a mejorar el servicio que brindamos a <strong>{{ account.nombre }}</strong>.</p>
    <div class="brand">Grupo Avantex &copy; 2026</div>
</div>
</body>
</html>
